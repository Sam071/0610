<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 期末綜合報告網頁</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 30px; }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">期末成果專案</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stock">股票查詢</a></li>
                    <li class="nav-item"><a class="nav-link" href="/weather">天氣與交通</a></li>
                    <li class="nav-item"><a class="nav-link" href="/food">台北美食</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要內容區塊 -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center my-5 text-muted">
        <p>© 2026 Python 期末報告作品</p>
    </footer>

    <!-- 引入 Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
